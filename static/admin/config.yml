backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Custom Slug", name: "slug", widget: "string", required: false, hint: "e.g. executive-debt-startup" }
      - { label: "Description", name: "description", widget: "string", hint: "Meta description for SEO 150-160 characters" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", default: ["AI", "Software"] }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Type", name: "type", widget: "hidden", default: "posts" }
      - { label: "Body", name: "body", widget: "markdown" }
