{{ define "main" }}
   <article>
       <div class="post-header">
           <h1>{{ .Title }}</h1>
          {{ if ne .Type "page" }}<div class="post-meta">{{ .Date.Format "January 2, 2006" }} • {{ .ReadingTime }} min read</div>{{ end }} 
       </div>
       
       <div class="post-content">
           {{ .Content }}
       </div>
   </article>
   {{ end }}
